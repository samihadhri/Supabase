name: Keep Supabase DB Awake

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  ping-database:
    runs-on: ubuntu-latest

    steps:
      - name: Exécuter une requête pour réveiller la DB
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          # On force l'acceptation du SSL
          PGSSLMODE: require
          # On donne 60 secondes à la DB pour se réveiller au lieu de 10 par défaut
          PGCONNECT_TIMEOUT: 60
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          
          # On ajoute l'option --echo-errors pour voir exactement ce qui bloque si ça échoue
          psql "$DB_URL" --echo-errors -c "SELECT 1 AS db_is_awake;"
