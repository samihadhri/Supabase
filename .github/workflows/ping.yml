name: Keep Supabase Awake2

on:
  schedule:
    # Tous les jours à 3h du matin
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Réveiller la DB via l'API
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          # On interroge le point de santé de Supabase. 
          # Si Supabase répond, ça veut dire que la DB est réveillée !
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROJECT_URL/auth/v1/health")
          
          if [ "$STATUS" = "200" ]; then
            echo "✅ Succès ! Supabase est réveillé (Status: 200)"
          else
            echo "❌ Échec (Status: $STATUS)"
            exit 1
          fi
